function fbSave(path, data) {
  try {
    return window.firebaseDB.ref(path).set(data);
  } catch(e) { return Promise.reject(e); }
}
function fbListen(path, cb) {
  try {
    return window.firebaseDB.ref(path).on('value', snap => cb(snap.val()));
  } catch(e) { return null; }
}
function fbUnlisten(path) {
  try { window.firebaseDB.ref(path).off(); } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function Field({label, children}) {
  return <div className="fld"><label>{label}</label>{children}</div>;
}
function TI({value, onChange, placeholder=''}) {
  return <input type="text" value={value||''} placeholder={placeholder} onChange={e=>onChange(e.target.value)}/>;
}
function NI({value, onChange, min=0, max=999, style={}}) {
  return <input type="number" value={value||0} min={min} max={max} style={style} onChange={e=>onChange(+e.target.value)}/>;
}
function Sel({value, options, onChange}) {
  return <select value={value} onChange={e=>onChange(e.target.value)}>
    {options.map(o=>typeof o==='object'
      ? <option key={o.v} value={o.v}>{o.l}</option>
      : <option key={o} value={o}>{o}</option>
    )}
  </select>;
}
function TA({value, onChange, placeholder='', minH=70}) {
  return <textarea value={value||''} placeholder={placeholder} style={{minHeight:minH}} onChange={e=>onChange(e.target.value)}/>;
}

function BarRow({label, cur, max, fillCls, onDec, onInc, setCur, setMax}) {
  const pct=Math.max(0,Math.min(100,(cur/Math.max(1,max))*100));
  const col=fillCls==='bar-pw'?'var(--red)':'var(--purple)';
  return (
    <div className="bar-row">
      <span className="bar-lbl">{label}</span>
      <div className="bar-wrap"><div className={`bar-fill ${fillCls}`} style={{width:pct+'%'}}/></div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button className="pm minus" onClick={onDec}>−</button>
        <span className="bar-nums">
          <input className="inum" type="number" value={cur} min={0} max={max} style={{color:col}}
            onChange={e=>setCur(Math.max(0,Math.min(max,+e.target.value)))}/>
          <span style={{color:'var(--muted)'}}>/</span>
          <input className="inum" type="number" value={max} min={1} style={{color:'var(--muted)'}}
            onChange={e=>setMax(Math.max(1,+e.target.value))}/>
        </span>
        <button className="pm" onClick={onInc}>+</button>
      </div>
    </div>
  );
}

function TabSkills({c, set}) {
  const skills=c.skills||{};
  const cycle=k=>{const cur=skills[k]||0;set('skills',{...skills,[k]:(cur+1)%3})};
  const bonus=s=>{const m=modN(c[ATTR_MAP[s.a]]||10);const lv=skills[s.k]||0;return lv===0?m-4:m+lv};
  const lvCls=k=>{const l=skills[k]||0;return l===1?'l1':l===2?'l2':''};
  const lvLbl=k=>{const l=skills[k]||0;return l===0?'—':l===1?'1':'★'};
  return (
    <div className="page">
      <div className="card">
        <div className="ct">Umiejętności</div>
        <div className="mono" style={{color:'var(--muted)',fontSize:9,marginBottom:8}}>KLIKNIJ KÓŁKO: — nierozwinięta / 1 rozwinięta / ★ specjalizacja</div>
        {SKILLS.map(s=>{
          const b=bonus(s);
          return (
            <div key={s.k} className="sk-row">
              <button className={`sk-cyc ${lvCls(s.k)}`} onClick={()=>cycle(s.k)}>{lvLbl(s.k)}</button>
              <span style={{flex:1,fontSize:13}}>{s.l}</span>
              <span className="mono" style={{color:'var(--muted)',fontSize:9,width:28}}>{s.a}</span>
              <span className="mono" style={{color:b>=0?'var(--gold)':'var(--red)',minWidth:32,textAlign:'right',fontSize:12}}>{b>=0?'+'+b:b}</span>
            </div>
          );
        })}
        <div className="sep"/>
        <div className="mono" style={{color:'var(--muted)',fontSize:9}}>Nierozwinięta = attr−4 | Rozwinięta = attr+poziom | Spec★ = przerzut raz na scenę</div>
      </div>
      <div className="card">
        <div className="ct">Biegłości</div>
        <TA value={c.bieglosci} onChange={v=>set('bieglosci',v)} placeholder="np. Biegłość z Mieczami, Biegłość z Łukami…" minH={80}/>
      </div>
    </div>
  );
}

function TabAbilities({c, set}) {
  const [mode,setMode]=useState('list'); // list | custom
  const [f,setF]=useState({name:'',typ:'ofensywna',koszt:'Akcja',cdr:'Scena',opis:''});
  const [search,setSearch]=useState('');
  const zdolnosci=c.zdolnosci||[];
  const cechy=Array.isArray(c.cechy)?c.cechy:[];

  const addFromCatalog=(item)=>{
    if(zdolnosci.find(z=>z.name===item.name))return;
    set('zdolnosci',[...zdolnosci,{...item,id:uid()}]);
  };
  const addCustom=()=>{
    if(!f.name.trim())return;
    set('zdolnosci',[...zdolnosci,{...f,id:uid()}]);
    setF({name:'',typ:'ofensywna',koszt:'Akcja',cdr:'Scena',opis:''});
  };
  const addCecha=(item)=>{
    if(cechy.find(x=>x.name===item.name))return;
    set('cechy',[...cechy,{...item,id:uid()}]);
  };

  const filtered=KATALOG_ZDOLNOSCI.filter(z=>
    z.name.toLowerCase().includes(search.toLowerCase()) ||
    z.typ.toLowerCase().includes(search.toLowerCase())
  );
  const filteredCechy=KATALOG_CECH.filter(c=>
    c.name.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="page">
      {/* Zdolności aktywne */}
      <div className="card">
        <div className="ct">Zdolności specjalne</div>
        {zdolnosci.length===0 && <p style={{color:'var(--muted)',fontStyle:'italic',fontSize:13,marginBottom:8}}>Brak zdolności</p>}
        {zdolnosci.map(z=>(
          <div key={z.id} className="ab-card">
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
              <div>
                <div className="ab-name">{z.name}</div>
                <div className="ab-tags">
                  <span className={`tag ${TAG_CLS[z.typ]||'tg'}`}>{z.typ}</span>
                  <span className="tag tg">{z.koszt}</span>
                  <span className="tag tg">CDR: {z.cdr}</span>
                </div>
              </div>
              <button className="del" onClick={()=>set('zdolnosci',zdolnosci.filter(x=>x.id!==z.id))}>×</button>
            </div>
            {z.opis && <div className="ab-desc">{z.opis}</div>}
          </div>
        ))}
        <div className="sep"/>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={`btn bsm ${mode==='list'?'bp':'bg'}`} onClick={()=>setMode('list')}>Z katalogu</button>
          <button className={`btn bsm ${mode==='custom'?'bp':'bg'}`} onClick={()=>setMode('custom')}>Własna</button>
        </div>
        {mode==='list' && (
          <div>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj zdolności…" style={{marginBottom:10}}/>
            <div style={{maxHeight:300,overflowY:'auto'}}>
              {filtered.map(item=>{
                const added=zdolnosci.find(z=>z.name===item.name);
                return (
                  <div key={item.name} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:added?'var(--muted)':'var(--cream)'}}>{item.name}</div>
                      <div className="mono" style={{fontSize:9,color:'var(--muted)'}}>{item.typ} · {item.koszt} · CDR {item.cdr}</div>
                    </div>
                    <button className={`btn bsm ${added?'bg':'bp'}`} onClick={()=>addFromCatalog(item)} disabled={!!added}>
                      {added?'✓':'+ Dodaj'}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {mode==='custom' && (
          <div>
            <div className="g2" style={{marginBottom:8}}>
              <Field label="Nazwa"><TI value={f.name} onChange={v=>setF({...f,name:v})} placeholder="np. Furia"/></Field>
              <Field label="Typ"><Sel value={f.typ} options={TYPY_AB} onChange={v=>setF({...f,typ:v})}/></Field>
            </div>
            <div className="g2" style={{marginBottom:8}}>
              <Field label="Koszt"><Sel value={f.koszt} options={['Akcja','Szybka Akcja','Reakcja','Pasywna']} onChange={v=>setF({...f,koszt:v})}/></Field>
              <Field label="CDR"><TI value={f.cdr} onChange={v=>setF({...f,cdr:v})} placeholder="Scena / Konflikt / 1 runda"/></Field>
            </div>
            <div className="fld" style={{marginBottom:8}}><label>Opis efektu</label><TA value={f.opis} onChange={v=>setF({...f,opis:v})} placeholder="Opisz efekt…"/></div>
            <button className="btn bp bsm" onClick={addCustom}>+ Dodaj zdolność</button>
          </div>
        )}
      </div>

      {/* Cechy */}
      <div className="card">
        <div className="ct">Cechy postaci</div>
        {cechy.length===0 && <p style={{color:'var(--muted)',fontStyle:'italic',fontSize:13,marginBottom:8}}>Brak cech</p>}
        {cechy.map(ch=>(
          <div key={ch.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:'var(--gold)',fontFamily:'Cinzel,serif'}}>{ch.name}</div>
              {ch.opis && <div style={{fontSize:12,color:'rgba(245,240,232,.7)',marginTop:3}}>{ch.opis}</div>}
            </div>
            <button className="del" onClick={()=>set('cechy',cechy.filter(x=>x.id!==ch.id))}>×</button>
          </div>
        ))}
        <div className="sep"/>
        <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj cech…" style={{marginBottom:10}}/>
        <div style={{maxHeight:250,overflowY:'auto'}}>
          {filteredCechy.map(item=>{
            const added=cechy.find(x=>x.name===item.name);
            return (
              <div key={item.name} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:added?'var(--muted)':'var(--cream)'}}>{item.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{item.opis}</div>
                </div>
                <button className={`btn bsm ${added?'bg':'bp'}`} onClick={()=>addCecha(item)} disabled={!!added}>
                  {added?'✓':'+ Dodaj'}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TabSpells({c, set}) {
  const [mode,setMode]=useState('list');
  const [f,setF]=useState({name:'',struna:'Infernum',ksiega:'I',koszt_pp:1,typ:'celowane',cdr:'—',opis:''});

    if(zaklecia.find(z=>z.name===item.name))return;
    set('zaklecia',[...zaklecia,{...item,id:uid()}]);
  };
  const addCustom=()=>{
    if(!f.name.trim())return;
    set('zaklecia',[...zaklecia,{...f,id:uid()}]);
    setF({name:'',struna:'Infernum',ksiega:'I',koszt_pp:1,typ:'celowane',cdr:'—',opis:''});
  };

  const filtered=KATALOG_ZAKLEC.filter(z=>{
    const matchSearch=z.name.toLowerCase().includes(search.toLowerCase());

                <div style={{fontFamily:'Cinzel,serif',fontSize:13,color:STRUNA_COL[z.struna]||'#9B7FE8'}}>{z.name}</div>
                <div className="sp-meta">{z.struna} · Księga {z.ksiega} · {z.typ} · {z.koszt_pp} PP · CDR {z.cdr}</div>
              </div>
              <button className="del" onClick={()=>set('zaklecia',zaklecia.filter(x=>x.id!==z.id))}>×</button>

          </div>
        ))}
        <div className="sep"/>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={`btn bsm ${mode==='list'?'bp':'bg'}`} onClick={()=>setMode('list')}>Z katalogu</button>
          <button className={`btn bsm ${mode==='custom'?'bp':'bg'}`} onClick={()=>setMode('custom')}>Własne</button>
        </div>
        {mode==='list' && (
          <div>
            <div className="g2" style={{marginBottom:10}}>
              <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj zaklęcia…"/>
              <Sel value={filterStruna} options={['Wszystkie',...STRUNY]} onChange={v=>setFilterStruna(v)}/>
            </div>
            <div style={{maxHeight:350,overflowY:'auto'}}>
              {filtered.map(item=>{
                const added=zaklecia.find(z=>z.name===item.name);
                return (
                  <div key={item.name} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:added?'var(--muted)':STRUNA_COL[item.struna]||'var(--cream)'}}>{item.name}</div>
                      <div className="mono" style={{fontSize:9,color:'var(--muted)'}}>Ksg {item.ksiega} · {item.typ} · {item.koszt_pp} PP</div>
                    </div>
                    <button className={`btn bsm ${added?'bg':'bp'}`} onClick={()=>addFromCatalog(item)} disabled={!!added}>
                      {added?'✓':'+ Dodaj'}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {mode==='custom' && (
          <div>
            <div className="g2" style={{marginBottom:8}}>
              <Field label="Nazwa"><TI value={f.name} onChange={v=>setF({...f,name:v})} placeholder="np. Kula Ognia"/></Field>
              <Field label="Struna"><Sel value={f.struna} options={STRUNY} onChange={v=>setF({...f,struna:v})}/></Field>
            </div>
            <div className="g4" style={{marginBottom:8}}>
              <Field label="Księga"><Sel value={f.ksiega} options={['I','II','III','IV']} onChange={v=>setF({...f,ksiega:v})}/></Field>
              <Field label="PP"><NI value={f.koszt_pp} onChange={v=>setF({...f,koszt_pp:v})} min={0} max={10}/></Field>
              <Field label="Typ"><Sel value={f.typ} options={['celowane','obszarowe','efektowe']} onChange={v=>setF({...f,typ:v})}/></Field>
              <Field label="CDR"><TI value={f.cdr} onChange={v=>setF({...f,cdr:v})} placeholder="—"/></Field>
            </div>
            <div className="fld" style={{marginBottom:8}}><label>Opis efektu</label><TA value={f.opis} onChange={v=>setF({...f,opis:v})} placeholder="Co robi zaklęcie…"/></div>
            <button className="btn bp bsm" onClick={addCustom}>+ Dodaj zaklęcie</button>
          </div>
        )}
      </div>
    </div>
  );
}

function TabEquipment({c, set}) {
  const [f,setF]=useState({name:'',slots:1,opis:''});
  const ekwipunek=c.ekwipunek||[];
  const slotMax=6+Math.max(0,modN(c.budowa));
  const slotUsed=ekwipunek.reduce((s,e)=>s+(+e.slots||1),0);
  const pct=Math.min(100,(slotUsed/slotMax)*100);
  const bron_dom=c.bron_dominujaca||{name:'',opis:''};
  const bron_nie=c.bron_niedominujaca||{name:'',opis:''};
  const pancerz=c.pancerz||{name:'',kp_bonus:0,opis:''};
  return (
    <div className="page">
      {/* Weapon slots */}
      <div className="card">
        <div className="ct">Broń</div>
        <div className="g2" style={{marginBottom:12}}>
          <div>
            <div className="mono" style={{fontSize:9,color:'var(--gold)',marginBottom:6}}>RĘKA DOMINUJĄCA</div>
            <div className="g2" style={{gap:8}}>
              <Field label="Broń"><TI value={bron_dom.name} onChange={v=>set('bron_dominujaca',{...bron_dom,name:v})} placeholder="np. Miecz długi"/></Field>
              <Field label="Notatka / obrażenia"><TI value={bron_dom.opis} onChange={v=>set('bron_dominujaca',{...bron_dom,opis:v})} placeholder="np. 1k8 cięte"/></Field>
            </div>
          </div>
          <div>
            <div className="mono" style={{fontSize:9,color:'var(--muted)',marginBottom:6}}>RĘKA NIEDOMINUJĄCA</div>
            <div className="g2" style={{gap:8}}>
              <Field label="Broń"><TI value={bron_nie.name} onChange={v=>set('bron_niedominujaca',{...bron_nie,name:v})} placeholder="np. Tarcza / Nóż"/></Field>
              <Field label="Notatka / efekt"><TI value={bron_nie.opis} onChange={v=>set('bron_niedominujaca',{...bron_nie,opis:v})} placeholder="np. +2 KP / 1k4"/></Field>
            </div>
          </div>
        </div>
      </div>

      {/* Armor slot */}
      <div className="card">
        <div className="ct">Pancerz</div>
        <div className="g3">
          <Field label="Pancerz"><TI value={pancerz.name} onChange={v=>set('pancerz',{...pancerz,name:v})} placeholder="np. Kolczuga"/></Field>
          <Field label="Bonus KP"><NI value={pancerz.kp_bonus} onChange={v=>set('pancerz',{...pancerz,kp_bonus:v})} min={0} max={20}/></Field>
          <Field label="Notatka"><TI value={pancerz.opis} onChange={v=>set('pancerz',{...pancerz,opis:v})} placeholder="np. Ciężki, −1 do ZRE"/></Field>
        </div>
        <div className="mono" style={{fontSize:9,color:'var(--muted)',marginTop:8}}>Pancerz nie wlicza się do slotów ekwipunku</div>
      </div>

      {/* General equipment */}
      <div className="card">
        <div className="ct">Ekwipunek ogólny</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <span className="mono" style={{fontSize:9,color:'var(--muted)'}}>SLOTY</span>
          <span className="mono" style={{fontSize:11,color:slotUsed>slotMax?'var(--red)':'var(--cream)'}}>{slotUsed} / {slotMax}</span>
        </div>
        <div className="slots-bar" style={{marginBottom:12}}>
          <div className="slots-fill" style={{width:pct+'%',background:pct>100?'var(--red)':undefined}}/>
        </div>
        {ekwipunek.length===0 && <p style={{color:'var(--muted)',fontStyle:'italic',fontSize:13,marginBottom:8}}>Brak przedmiotów</p>}
        {ekwipunek.map(e=>(
          <div key={e.id} className="eq-row">
            <span style={{flex:1,fontSize:13}}>{e.name}</span>
            {e.opis && <span style={{flex:1,paddingLeft:8,fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{e.opis}</span>}
            <span className="mono" style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>{e.slots===0.5||e.slots==='0.5'?'½':e.slots} slot{+e.slots>1?'y':''}</span>
            <button className="del" onClick={()=>set('ekwipunek',ekwipunek.filter(x=>x.id!==e.id))}>×</button>
          </div>
        ))}
        <div className="sep"/>
        <div className="g3" style={{marginBottom:8}}>
          <div style={{gridColumn:'span 2'}}>
            <Field label="Nazwa"><TI value={f.name} onChange={v=>setF({...f,name:v})} placeholder="np. Lina, Pochodnia x3"/></Field>
          </div>
          <Field label="Sloty">
            <Sel value={''+f.slots} options={[{v:'0.5',l:'½'},{v:'1',l:'1'},{v:'2',l:'2'},{v:'3',l:'3'},{v:'4',l:'4'}]} onChange={v=>setF({...f,slots:+v})}/>
          </Field>
        </div>
        <div className="fld" style={{marginBottom:8}}><label>Notatka</label><TI value={f.opis} onChange={v=>setF({...f,opis:v})} placeholder="np. 5 użyć, leczy 1k4 PW"/></div>
        <button className="btn bp bsm" onClick={()=>{
          if(!f.name.trim())return;
          set('ekwipunek',[...ekwipunek,{...f,id:uid()}]);
          setF({name:'',slots:1,opis:''});
        }}>+ Dodaj przedmiot</button>
      </div>
    </div>
  );
}

function TabNotes({c, set}) {
  return (
    <div className="page">
      <div className="card">
        <div className="ct">Notatki z sesji</div>
        <TA value={c.notatki} onChange={v=>set('notatki',v)} placeholder="Notatki, zadania, ważne NPC, wskazówki, sekrety…" minH={350}/>
      </div>
    </div>
  );
}

// ── GM VIEW ───────────────────────────────────────────────────────────────────
function GMView({session, chars}) {
  const list = Object.values(chars||{});
  return (
    <div className="page">
      <div className="ct" style={{marginBottom:16}}>Widok MG — Sesja: {session}</div>
      <div className="gm-grid">
        {list.length===0 && (
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
            <div style={{fontSize:36,marginBottom:12}}>⏳</div>
            <div>Czekam na graczy…</div>
            <div style={{marginTop:8}}>Podeślij im kod: <strong style={{color:'var(--gold)'}}>{session}</strong></div>
          </div>
        )}
        {list.map(c=>{
          const pwPct=Math.max(0,Math.min(100,(c.pw/Math.max(1,c.pwMax))*100));
          const ppPct=Math.max(0,Math.min(100,(c.pp/Math.max(1,c.ppMax))*100));
          const rany=c.rany||[];
          return (
            <div key={c.id} className="gm-card">
              <div className="gm-name">{c.name}</div>
              <div className="gm-sub">{c.rasa} · {c.klasa} · Poz.{c.poziom}{c.patron?' · '+c.patron:''}</div>
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span className="mono" style={{fontSize:9,color:'var(--muted)'}}>PW</span>
                  <span className="mono" style={{color:'var(--red)',fontSize:11}}>{c.pw}/{c.pwMax}</span>
                </div>
                <div className="bar-wrap" style={{height:8}}><div className="bar-fill bar-pw" style={{width:pwPct+'%'}}/></div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span className="mono" style={{fontSize:9,color:'var(--muted)'}}>PP</span>
                  <span className="mono" style={{color:'var(--purple)',fontSize:11}}>{c.pp}/{c.ppMax}</span>
                </div>
                <div className="bar-wrap" style={{height:8}}><div className="bar-fill bar-pp" style={{width:ppPct+'%'}}/></div>
              </div>
              <div className="sep"/>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <span className="mono" style={{fontSize:10}}>KP {c.kp}</span>
                <span className="mono" style={{fontSize:10}}>AW {(c.aw||0)>=0?'+'+(c.aw||0):(c.aw||0)}</span>
                {c.mz ? <span className="mono" style={{fontSize:10,color:'var(--purple)'}}>Mz {c.mz}</span> : null}
              </div>
              {c.statusy ? <div className="mono" style={{marginTop:6,fontSize:9,color:'var(--gold)'}}>{c.statusy}</div> : null}
              {rany.length>0 && <div style={{marginTop:6}}>
                {rany.map(r=><span key={r.id} className="mono" style={{fontSize:9,color:INJ_COL[r.typ],marginRight:6}}>[{r.typ[0]}] {r.opis}</span>)}
              </div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SHEET SHELL ───────────────────────────────────────────────────────────────
function CharSheet({char, onUpdate}) {
  const [tab,setTab]=useState('overview');
  const TABS=[
    {k:'overview',l:'Postać'},{k:'combat',l:'Walka & Rany'},
    {k:'skills',l:'Umiejętności'},{k:'abilities',l:'Zdolności'},
    {k:'spells',l:'Zaklęcia'},{k:'equipment',l:'Ekwipunek'},
    {k:'notes',l:'Notatki'},
  ];
  const set=(k,v)=>onUpdate({...char,[k]:v});
  return (
    <>
      <div className="tabs">
        {TABS.map(t=><button key={t.k} className={`tab ${tab===t.k?'active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>)}
      </div>
      {tab==='overview' && <TabOverview c={char} set={set}/>}
      {tab==='combat'   && <TabCombat c={char} set={set}/>}
      {tab==='skills'   && <TabSkills c={char} set={set}/>}
      {tab==='abilities'&& <TabAbilities c={char} set={set}/>}
      {tab==='spells'   && <TabSpells c={char} set={set}/>}
      {tab==='equipment'&& <TabEquipment c={char} set={set}/>}
      {tab==='notes'    && <TabNotes c={char} set={set}/>}
    </>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onJoin}) {
  const [name, setName] = useState('');
  const [haslo, setHaslo] = useState('');
  const [error, setError] = useState('');

  const tryLogin = () => {
    if(!name.trim()) { setError('Wpisz imię postaci.'); return; }
    if(haslo === HASLO_MG) {
      onJoin({type:'gm', charName:'', playerName:'MG', code: SESSION_ID});
    } else if(haslo === HASLO_GRACZA) {
      onJoin({type:'player', charName:name, playerName:name, code: SESSION_ID});
    } else {
      setError('Nieprawidłowe hasło.');
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">ECHO</div>
        <p className="login-sub">System kart postaci</p>
        <div className="fld" style={{marginBottom:8,textAlign:'left'}}>
          <label>Imię postaci / nick</label>
          <input type="text" value={name} placeholder="Twoje imię…"
            onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&tryLogin()}
            autoFocus/>
        </div>
        <div className="fld" style={{marginBottom:16,textAlign:'left'}}>
          <label>Hasło</label>
          <input type="password" value={haslo} placeholder="Hasło gracza lub MG…"
            onChange={e=>setHaslo(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&tryLogin()}/>
        </div>
        {error && <p style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{error}</p>}
        <button className="btn bp w100" onClick={tryLogin}>Wejdź</button>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const saved = lsGet();
  const [session,setSession]=useState(saved.session||null);
  const [role,setRole]=useState(saved.role||null);
  const [charId,setCharId]=useState(saved.charId||null);
  const [char,setCharState]=useState(saved.char||null);
  const [allChars,setAllChars]=useState(saved.allChars||(saved.char?{[saved.char.id]:saved.char}:{}));
  const [syncStatus,setSyncStatus]=useState('offline');
  const saveTimeout=useRef(null);
  const listenerRefPath=useRef(null);

  // init firebase listener on mount
  useEffect(()=>{
    if(saved.session && saved.session!=='OFFLINE') {
      startListen(saved.session, saved.role, saved.charId);
    }
  },[]);

  function startListen(sess, rl, cid) {
    if(!window.firebaseDB||!sess||sess==='OFFLINE') return;
    const path = rl==='gm' ? `sessions/${sess}/chars` : `sessions/${sess}/chars/${cid}`;
    if(listenerRefPath.current===path) return;
    if(listenerRefPath.current) fbUnlisten(listenerRefPath.current);
    listenerRefPath.current=path;
    fbListen(path, val=>{
      if(rl==='gm') setAllChars(val||{});
      else if(val && val.id===cid) setCharState(val);
    });
  }

  function doSave(c, sess) {
    if(saveTimeout.current) clearTimeout(saveTimeout.current);
    setSyncStatus('saving');
    saveTimeout.current=setTimeout(async()=>{
      lsSave({session:sess||session,role,charId:c.id,char:c,allChars});
      const s = sess||session;
      if(window.firebaseDB && s && s!=='OFFLINE') {
        try {
          await fbSave(`sessions/${s}/chars/${c.id}`, c);
          setSyncStatus('saved');
        } catch(e) {
          console.error('Firebase save error:', e);
          setSyncStatus('offline');
        }
      } else {
        setSyncStatus('saved');
      }
    },400);
  }

  function setChar(c) {
    setCharState(c);
    setAllChars(prev=>({...prev,[c.id]:c}));
    doSave(c, session);
  }

  function handleJoin({type,charName,playerName,code}) {
    const cid=uid();
    const c=type==='player'?defChar(charName,playerName,cid):null;
    setSession(code); setRole(type); setCharId(cid);
    if(c) setChar(c);
    lsSave({session:code,role:type,charId:cid,char:c,allChars:c?{[cid]:c}:{}});
    setTimeout(()=>startListen(code,type,cid),300);
  }

  function handleLogout() {
    if(listenerRefPath.current) fbUnlisten(listenerRefPath.current);
    lsSave({});
    setSession(null);setRole(null);setCharId(null);setCharState(null);setAllChars({});setSyncStatus('offline');
  }

  if(!session) return <Login onJoin={handleJoin}/>;

  const dotCls='dot'+(syncStatus==='offline'?' offline':syncStatus==='saving'?' saving':'');
  const topbar=(
    <header className="topbar">
      <span className="logo">ECHO</span>
      <div className="topbar-r">
        <span className={dotCls} title={syncStatus==='saved'?'Zapisano':syncStatus==='saving'?'Zapisywanie…':'Offline — tryb lokalny'}/>
        <span style={{color:'var(--muted)',fontSize:10}}>{syncStatus==='saved'?'Zapisano':syncStatus==='saving'?'Zapisywanie…':'Lokalnie'}</span>
        <span style={{color:'var(--gold)',fontFamily:'Cinzel,serif',fontSize:12}}>{role==='gm'?'⚔ Mistrz Gry':char?.name||''}</span>
        <button className="btn bg bsm" onClick={handleLogout}>Wyloguj</button>
      </div>
    </header>
  );

  return (
    <>
      {topbar}
      {role==='gm'
        ? <GMView session={session} chars={allChars}/>
        : char
          ? <CharSheet char={char} onUpdate={setChar}/>
          : null
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
