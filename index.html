<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<title>ECHO — Karta Postaci</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--ink:#1C1C2E;--gold:#C9A84C;--gold2:#8B6914;--cream:#F5F0E8;--muted:#6B6580;--panel:#252538;--border:rgba(201,168,76,0.25);--red:#C84B4B;--purple:#7B5FC0;--green:#4CAF50}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--cream);font-family:'Crimson Pro',serif;font-size:15px;line-height:1.5;min-height:100vh}
/* TOPBAR */
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.15em}
.topbar-r{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.sync{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dot.ok{background:var(--green)}.dot.saving{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* TABS */
.tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab{padding:11px 14px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--cream)}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* LAYOUT */
.page{padding:20px;max-width:1100px;margin:0 auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:660px){.g6{grid-template-columns:repeat(3,1fr)}.g3,.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:14px}
.ct{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* FIELD */
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:0}
.fld label,.flbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:3px}
input,select,textarea{background:rgba(0,0,0,.35);border:1px solid rgba(201,168,76,.18);border-radius:4px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:14px;padding:7px 9px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input[type=number]{-moz-appearance:textfield}.input-inline{background:none;border:none;color:inherit;font:inherit;text-align:center;padding:0;outline:none;width:40px}
select option{background:var(--panel)}
textarea{resize:vertical;min-height:70px}
/* ATTR */
.attr-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.attr-name{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.attr-val{font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--cream);background:none;border:none;text-align:center;width:100%;outline:none}
.attr-mod{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:500}
/* STAT BIG */
.stat-big{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.stat-val{font-family:'Cinzel',serif;font-size:28px;font-weight:700;background:none;border:none;text-align:center;width:100%;outline:none}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;margin-top:4px}
/* BAR */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bar-lbl{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);width:28px;letter-spacing:.08em}
.bar-wrap{flex:1;background:rgba(0,0,0,.5);border-radius:3px;height:9px;overflow:hidden;border:1px solid rgba(255,255,255,.04)}
.bar-fill{height:100%;border-radius:3px;transition:width .35s}
.bar-pw{background:linear-gradient(90deg,#8B2020,#C84B4B)}
.bar-pp{background:linear-gradient(90deg,#3D2B6E,#7B5FC0)}
.bar-nums{display:flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:12px}
.pm{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--cream);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1}
.pm:hover{background:rgba(201,168,76,.2);color:var(--gold)}.pm.minus:hover{background:rgba(139,32,32,.3);color:var(--red)}
/* SKILL */
.sk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sk-cyc{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;transition:all .15s;flex-shrink:0}
.sk-cyc.l1{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.sk-cyc.l2{background:rgba(201,168,76,.28);border-color:var(--gold);color:var(--gold);font-weight:700}
/* ABILITY/SPELL */
.ab-card{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:5px;padding:11px;margin-bottom:9px}
.ab-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:3px}
.ab-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid}
.tg{color:var(--gold);border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.07)}
.ta{color:#9B7FE8;border-color:rgba(155,127,232,.35);background:rgba(61,43,110,.18)}
.tr{color:var(--red);border-color:rgba(200,75,75,.35);background:rgba(139,32,32,.12)}
.ab-desc{font-size:12px;color:rgba(245,240,232,.72);line-height:1.5}
.sp-card{background:rgba(61,43,110,.12);border:1px solid rgba(155,127,232,.2);border-radius:5px;padding:10px;margin-bottom:8px}
.sp-name{font-family:'Cinzel',serif;font-size:13px}
.sp-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}
/* INJURY */
.inj-card{background:rgba(139,32,32,.1);border:1px solid rgba(200,75,75,.2);border-radius:5px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.inj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* EQ */
.eq-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.slots-bar{height:5px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden;margin-bottom:6px}
.slots-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .3s;border-radius:3px}
/* CATALOG */
.cat-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cat-row-info{flex:1;min-width:0}
.cat-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.cat-scroll{max-height:320px;overflow-y:auto;margin-top:8px}
/* BTNS */
.btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;padding:7px 14px;border-radius:4px;cursor:pointer;transition:all .2s;border:1px solid;text-transform:uppercase;display:inline-block}
.bp{background:rgba(201,168,76,.13);border-color:var(--gold);color:var(--gold)}.bp:hover{background:rgba(201,168,76,.28)}
.bg{background:none;border-color:var(--border);color:var(--muted)}.bg:hover{border-color:var(--gold);color:var(--gold)}
.bsm{padding:4px 10px;font-size:10px}
.btn:disabled{opacity:.4;cursor:not-allowed}
/* LOGIN */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:36px;width:100%;max-width:400px}
.box-logo{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--gold);letter-spacing:.2em;text-align:center;margin-bottom:6px}
.box-sub{color:var(--muted);font-size:13px;font-style:italic;text-align:center;margin-bottom:24px}
.err{color:var(--red);font-size:13px;margin:8px 0;text-align:center}
.ok-msg{color:var(--green);font-size:13px;margin:8px 0;text-align:center}
/* GM */
.gm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.gm-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:border-color .2s}
.gm-card:hover{border-color:var(--gold)}
.gm-name{font-family:'Cinzel',serif;font-size:15px;color:var(--gold)}
.gm-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
/* UTILS */
.sep{height:1px;background:var(--border);margin:12px 0}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.muted{color:var(--muted)}.italic{font-style:italic}.w100{width:100%}
.flex{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.gap8{gap:8px}.gap12{gap:12px}
.del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;transition:color .15s}
.del:hover{color:var(--red)}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.mode-btns{display:flex;gap:8px;margin-bottom:12px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

const modN = v => Math.floor(((+v||10)-10)/2);
const modS = v => { const m=modN(v); return (m>=0?'+':'')+m; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const slugify = s => s.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20);
const el = (tag,attrs={},children=[]) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e[k]=v;
    else if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(v!=null&&v!==false) e.setAttribute(k,v);
  }
  for(const c of [children].flat(9)) {
    if(c==null) continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(''+c):c);
  }
  return e;
};
const div=(cls,...ch)=>el('div',{class:cls},...ch);
const span=(cls,...ch)=>el('span',{class:cls},...ch);
const btn=(cls,txt,onclick,disabled=false)=>el('button',{class:'btn '+cls,onclick,disabled},txt);
const inp=(attrs,oninput)=>{ const e=el('input',attrs); if(oninput) e.oninput=ev=>oninput(ev.target.value); return e; };
const sel=(attrs,opts,onchange)=>{
  const e=el('select',attrs);
  for(const o of opts){const op=el('option',{value:typeof o==='object'?o.v:o},typeof o==='object'?o.l:o);if((typeof o==='object'?o.v:o)==attrs.value)op.selected=true;e.appendChild(op);}
  if(onchange) e.onchange=ev=>onchange(ev.target.value);
  return e;
};
const ta=(attrs,oninput)=>{ const e=el('textarea',attrs); if(oninput) e.oninput=ev=>oninput(ev.target.value); return e; };
const fld=(label,input)=>div('fld',el('label',{},label),input);
const sep=()=>div('sep');

// ── FIREBASE OPS ──────────────────────────────────────────────────────────────
function fbSave(path,data){
  return db.ref(path).set(data)
    .then(()=>setSyncStatus('saved'))
    .catch(e=>{console.error('FB save error:',e);setSyncStatus('offline');});
}
function fbListen(path,cb){ return db.ref(path).on('value',snap=>cb(snap.val())); }
function fbUnlisten(path){ db.ref(path).off(); }

function setSyncStatus(s){
  state.syncStatus=s;
  const dot=document.querySelector('.dot');
  const lbl=document.querySelector('.sync-lbl');
  if(dot){ dot.className='dot '+(s==='saved'?'ok':s==='saving'?'saving':''); }
  if(lbl){ lbl.textContent=s==='saved'?'Zapisano':s==='saving'?'Zapisywanie…':'Lokalnie'; }
}

function schedSave(c){
  if(saveTimer) clearTimeout(saveTimer);
  setSyncStatus('saving');
  saveTimer=setTimeout(()=>{
    if(c&&state.charId) fbSave(`sessions/${SESSION}/chars/${state.charId}`,c);
  },500);
}

function setChar(patch){
  state.char={...state.char,...patch};
  state.allChars[state.charId]=state.char;
  schedSave(state.char);
  reRender();
}

function startPlayerListener(){
  if(fbListener) fbUnlisten(`sessions/${SESSION}/chars/${state.charId}`);
  fbListener=fbListen(`sessions/${SESSION}/chars/${state.charId}`,val=>{
    if(val&&val.id===state.charId){
      state.char=val;
      reRender();
    }
  });
}

function startGMListener(){
  if(fbListener) fbUnlisten(`sessions/${SESSION}/chars`);
  fbListener=fbListen(`sessions/${SESSION}/chars`,val=>{
    state.allChars=val||{};
    reRender();
  });
}

// ── LOGIN FLOW ────────────────────────────────────────────────────────────────
function renderLogin(){
  let errMsg='';
  const nameInp=inp({type:'text',placeholder:'Twoje imię / nick postaci…',class:'mb8',style:{marginBottom:'10px'}});
  const passInp=inp({type:'password',placeholder:'Hasło…'});
  const errEl=div('err','');
  const doLogin=()=>{
    const name=nameInp.value.trim();
    const pass=passInp.value;
    if(!name){errEl.textContent='Wpisz imię.';return;}
    if(pass===HASLO_MG){
      state.role='gm';
      state.screen='gm';
      startGMListener();
      reRender();
    } else if(pass===HASLO_GRACZA){
      // check if char with this name exists
      db.ref(`sessions/${SESSION}/chars`).once('value',snap=>{
        const chars=snap.val()||{};
        const existing=Object.values(chars).find(c=>c.name.toLowerCase()===name.toLowerCase());
        if(existing){
          // log into existing
          state.charId=existing.id;
          state.char=existing;
          state.role='player';
          state.screen='sheet';
          startPlayerListener();
          reRender();
        } else {
          // show create screen
          state.role='player';
          state.screen='create';
          state._pendingName=name;
          reRender();
        }
      });
    } else {
      errEl.textContent='Nieprawidłowe hasło.';
    }
  };
  nameInp.onkeydown=e=>e.key==='Enter'&&passInp.focus();
  passInp.onkeydown=e=>e.key==='Enter'&&doLogin();
  return div('screen',div('box',
    div('box-logo','ECHO'),
    el('p',{class:'box-sub'},'System kart postaci'),
    fld('Imię / nick postaci',nameInp),
    el('br'),
    fld('Hasło',passInp),
    errEl,
    el('br'),
    btn('bp w100','Wejdź',doLogin)
  ));
}

function renderCreate(){

  const rasaSel=sel({value:'Człowiek'},RACES,v=>{});

    c.klasa=klasseSel.value;
    c.rasa=rasaSel.value;

    startPlayerListener();
    reRender();

    div('box-logo','ECHO'),
    el('p',{class:'box-sub'},`Witaj, ${name}! Stwórzmy twoją postać.`),

// ── BAR ROW ───────────────────────────────────────────────────────────────────
function barRow(label,curKey,maxKey,fillCls){
  const c=state.char;
  const cur=+c[curKey]||0, max=+c[maxKey]||1;
  const pct=Math.max(0,Math.min(100,(cur/max)*100));
  const fill=div('bar-fill '+fillCls); fill.style.width=pct+'%';
  const col=fillCls==='bar-pw'?'var(--red)':'var(--purple)';
  const curI=inp({type:'number',class:'input-inline',min:0,max:max,value:cur,style:{color:col}},v=>setChar({[curKey]:Math.max(0,Math.min(max,+v))}));
  const maxI=inp({type:'number',class:'input-inline',min:1,value:max,style:{color:'var(--muted)'}},v=>setChar({[maxKey]:Math.max(1,+v)}));
  return div('bar-row',
    span('bar-lbl',label),
    div('bar-wrap',fill),
    div('bar-nums',
      btn('pm minus','−',()=>setChar({[curKey]:Math.max(0,cur-1)})),
      curI,span('muted','/'),maxI,
      btn('pm','+',()=>setChar({[curKey]:Math.min(max,cur+1)}))
    )
  );
}

        ),
        div('',
          span('flbl','RĘKA NIEDOMINUJĄCA'),
          div('g2 mb8',
            fld('Broń / tarcza',inp({type:'text',value:bn.name,placeholder:'np. Tarcza'},v=>setChar({bron_nie:{...bn,name:v}}))),
            fld('Efekt / notatka',inp({type:'text',value:bn.opis,placeholder:'np. +2 KP'},v=>setChar({bron_nie:{...bn,opis:v}})))
          )
        )
      )
    ),
    div('card',
      div('ct','Pancerz'),
      div('g3',
        fld('Pancerz',inp({type:'text',value:pa.name,placeholder:'np. Kolczuga'},v=>setChar({pancerz:{...pa,name:v}}))),
        fld('Bonus KP',inp({type:'number',min:0,max:20,value:pa.kp_bonus||0},v=>setChar({pancerz:{...pa,kp_bonus:+v}}))),
        fld('Notatka',inp({type:'text',value:pa.opis,placeholder:'np. Ciężki, −1 ZRE'},v=>setChar({pancerz:{...pa,opis:v}})))
      ),
      span('mono muted',{style:{fontSize:9,marginTop:6,display:'block'}},'Pancerz nie wlicza się do slotów ekwipunku')
    ),
    div('card',
      div('ct','Ekwipunek ogólny'),
      div('flex jb ac mb8',
        span('mono muted',{style:{fontSize:9}},'SLOTY'),
        span('mono',{style:{fontSize:11,color:slotUsed>slotMax?'var(--red)':'var(--cream)'}},slotUsed+' / '+slotMax)
      ),
      div('slots-bar mb12',fill),
      eq.length===0?span('muted italic mb8',{style:{display:'block',marginBottom:8}},'Brak przedmiotów'):div('',
        ...eq.map(e=>div('eq-row',
          span('',{style:{flex:1,fontSize:13}},e.name),
          e.opis?span('',{style:{flex:1,paddingLeft:8,fontSize:12,color:'var(--muted)',fontStyle:'italic'}},e.opis):null,
          span('mono muted',{style:{fontSize:10,whiteSpace:'nowrap'}},(e.slots===0.5?'½':e.slots)+' slot'+(+e.slots>1?'y':'')),
          el('button',{class:'del',onclick:()=>setChar({ekwipunek:eq.filter(x=>x.id!==e.id)})},'×')
        ))
      ),
      sep(),
      div('g3 mb8',
        div('',{style:{gridColumn:'span 2'}},fld('Nazwa',inp({type:'text',value:f.name,placeholder:'np. Lina, Pochodnia x3'},v=>{state.eqForm.name=v;}))),
        fld('Sloty',sel({value:''+f.slots},[{v:'0.5',l:'½'},{v:'1',l:'1'},{v:'2',l:'2'},{v:'3',l:'3'},{v:'4',l:'4'}],v=>{state.eqForm.slots=+v;}))
      ),
      fld('Notatka (opcjonalnie)',inp({type:'text',value:f.opis,placeholder:'np. 5 użyć, leczy 1k4 PW'},v=>{state.eqForm.opis=v;})),
      el('br'),
      btn('bp bsm','+ Dodaj przedmiot',()=>{
        if(!state.eqForm.name.trim())return;
        setChar({ekwipunek:[...eq,{...state.eqForm,id:uid()}]});
        state.eqForm={name:'',slots:1,opis:''};
      })
    )
  );
}

function tabNotes(){
  const c=state.char;
  return div('page',
    div('card',div('ct','Notatki z sesji'),
      ta({placeholder:'Notatki, zadania, ważne NPC, wskazówki, sekrety…',value:c.notatki||'',style:{minHeight:'350px'}},v=>setChar({notatki:v}))
    )
  );
}

// ── SHEET ─────────────────────────────────────────────────────────────────────
function renderSheet(){
  const TABS=[
    {k:'overview',l:'Postać'},{k:'combat',l:'Walka & Rany'},
    {k:'skills',l:'Umiejętności'},{k:'abilities',l:'Zdolności'},
    {k:'spells',l:'Zaklęcia'},{k:'equipment',l:'Ekwipunek'},
    {k:'notes',l:'Notatki'},
  ];
  const tabBar=div('tabs',...TABS.map(t=>{
    const b=el('button',{class:'tab '+(state.tab===t.k?'active':''),onclick:()=>{state.tab=t.k;reRender();}},t.l);
    return b;
  }));
  const content={
    overview:tabOverview,combat:tabCombat,skills:tabSkills,
    abilities:tabAbilities,spells:tabSpells,equipment:tabEquipment,notes:tabNotes,
  }[state.tab]();
  return div('',renderTopbar(),tabBar,content);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function reRender(){
  const app=document.getElementById('app');
  app.innerHTML='';
  let content;
  if(state.screen==='login') content=renderLogin();
  else if(state.screen==='create') content=renderCreate();
  else if(state.screen==='gm') content=renderGM();
  else content=renderSheet();
  app.appendChild(content);
}

reRender();
</script>
</body>
</html>
